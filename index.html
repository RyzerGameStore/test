        main { flex-grow: 1; padding: 25px 40px; overflow-y: auto; }

            border-color: var(--accent-blue);
        }

            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-item { display: flex; flex-direction: column; gap: 10px; cursor: pointer; }
        .game-item.hidden { display: none; }

        .game-card {
            aspect-ratio: 3/4.5; background: var(--card-bg);
            border-radius: 12px; overflow: hidden; transition: 0.3s;
            border: 2px solid transparent; position: relative;
        }

        .badge-new {
            position: absolute; top: 10px; right: 10px;
            background: var(--accent-red); color: white;
            font-size: 10px; font-weight: bold; padding: 4px 8px;
            border-radius: 6px; z-index: 5; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .game-item:hover .game-card { transform: translateY(-5px); border-color: var(--accent-blue); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }
        .game-name { font-size: 13px; text-align: center; font-weight: 500; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

        .modal-content {
            background: var(--modal-bg); width: 850px; border-radius: 20px;
            display: flex; overflow: hidden; border: 1px solid #333;
        }

        .modal-left { width: 40%; background: #000; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { width: 60%; padding: 40px; position: relative; }
        
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #555; cursor: pointer; }
        .close-btn:hover { color: white; }

        .game-info-title { color: var(--accent-blue); font-size: 28px; font-weight: bold; margin-bottom: 10px; }

        function renderGames(currentCat = 'denuvo') {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = "";
            
            const filteredGames = listGame.filter(g => g.cat === currentCat);

            filteredGames.forEach(g => {
                const item = document.createElement('div');
                item.className = 'game-item';
                item.onclick = () => showPop(g);
                item.innerHTML = `
                    <div class="game-card">
                        ${g.isNew ? '<div class="badge-new">NEW</div>' : ''}
                        <img src="${g.img}" alt="${g.name}">
                    </div>
                    <div class="game-name">${g.name}</div>
                `;
                grid.appendChild(item);
            });
            updateAutoCount();
        }

        function filterCategory(cat, el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            
            const titles = {
                'denuvo': 'Denuvo Games',
                'thirdparty': 'Third Party Game',
                'standard': 'Standard Game',
                'simulator': 'Simulator Game'
            };
            document.getElementById('categoryTitle').innerText = titles[cat];
            renderGames(cat);
        }

        function searchGame() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.game-item');
            items.forEach(item => {
                const name = item.querySelector('.game-name').innerText.toLowerCase();
                item.classList.toggle('hidden', !name.includes(term));
            });
            updateAutoCount();
        }

        function updateAutoCount() {
            const visibleGames = document.querySelectorAll('.game-item:not(.hidden)').length;
            document.getElementById('autoCount').innerText = `${visibleGames} Games Found`;
        }

        function showPop(g) {
            document.getElementById('modalTitle').innerText = g.name;
            document.getElementById('modalSize').innerText = "📦 Storage: " + g.size;
            document.getElementById('modalImg').src = g.img;
            document.getElementById('modalReq').innerHTML = `
                <div class="req-line"><b>OS</b><span>: ${g.os}</span></div>
                <div class="req-line"><b>Processor</b><span>: ${g.proc}</span></div>
                <div class="req-line"><b>RAM</b><span>: ${g.ram}</span></div>
                <div class="req-line"><b>Graphics</b><span>: ${g.gpu}</span></div>
                <div class="req-line"><b>DirectX</b><span>: ${g.dx}</span></div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        window.onclick = (e) => { if(e.target == document.getElementById('modalOverlay')) closeModal(); }

        // Load Default
        renderGames();
    </script>
